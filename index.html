<div onclick="startMusic()" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
font-size:18px;
">
点击开始播放 ❤️
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>

<script>
function startMusic(){
    const music = document.getElementById("music");

    music.play().then(()=>{
        document.querySelector("div").style.display = "none";
    }).catch(()=>{
        alert("再点一次屏幕");
    });
}
</script>
