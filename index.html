<audio id="music" loop></audio>

<div onclick="startMusic()" style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,0.7);color:#fff;z-index:999;">
点击屏幕开始播放 ❤️
</div>

<script>
function startMusic(){
    const music = document.getElementById("music");

    // 点击后再加载音频（关键）
    music.src = "https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8f7b5c2.mp3?filename=romantic-ambient-110065.mp3";

    music.play().catch(e=>{
        alert("播放被拦截，请再点一次屏幕");
    });

    document.querySelector("div").style.display = "none";
}
</script>
