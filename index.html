<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>写给周权玲</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ffe6f0, #e6f7ff);
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .card {
        width: 380px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255,255,255,0.9);
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        text-align: center;
        backdrop-filter: blur(8px);
    }

    .title {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .to {
        font-size: 13px;
        color: #888;
        margin-bottom: 20px;
    }

    #text {
        font-size: 16px;
        line-height: 2;
        color: #444;
        text-align: left;
        min-height: 160px;
        white-space: pre-wrap;
    }

    .cursor {
        display: inline-block;
        width: 2px;
        background: #ff4d88;
        animation: blink 0.8s infinite;
        margin-left: 2px;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }

    .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #aaa;
    }
</style>
</head>

<body>

<div class="card">
    <div class="title">一封慢慢写出的心意</div>
    <div class="to">写给：周权玲</div>

    <div id="text"></div>

    <div class="footer">—— 正在书写中…</div>
</div>

<script>
const content = `1. 佳人权玲，温柔自成光。
2. 一见权玲，心生欢喜。
3. 周府有女，玲珑明媚。
4. 眉眼含笑，权玲如故。`;

let i = 0;
const speed = 80; // 打字速度

function typeWriter() {
    if (i < content.length) {
        document.getElementById("text").innerHTML =
            content.substring(0, i) + '<span class="cursor"></span>';
        i++;
        setTimeout(typeWriter, speed);
    } else {
        document.getElementById("text").innerHTML = content;
    }
}

typeWriter();
</script>

</body>
</html>
