<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>情书</title>
</head>

<body style="margin:0;background:black;">

<div id="cover" onclick="startMusic()" style="
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
z-index:999;
">
点击屏幕开始播放 ❤️
</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<script>
function startMusic(){
    const music = document.getElementById("music");

    music.play().then(()=>{
        document.getElementById("cover").style.display = "none";
    }).catch(err=>{
        alert("再点一次屏幕");
        console.log(err);
    });
}
</script>

</body>
</html>
